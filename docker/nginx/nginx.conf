# Mini X API Gateway — routes read-heavy vs write-heavy traffic
# Phase 2-3: Load balancer + CQRS-style service split

upstream write_pool {
    least_conn;
    server host.docker.internal:3001;
    server host.docker.internal:3002;
}

upstream read_pool {
    least_conn;
    server host.docker.internal:4001;
    server host.docker.internal:4002;
}

server {
    listen 80;

    add_header Access-Control-Allow-Origin "http://localhost:5173" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;

    if ($request_method = OPTIONS) {
        return 204;
    }

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Authorization $http_authorization;

    location = /health {
        proxy_pass http://write_pool/health;
    }

    location /api/auth/ {
        proxy_pass http://write_pool;
    }

    # GET /api/posts → Python read pool | POST → TypeScript write pool
    location = /api/posts {
        error_page 418 = @posts_read;
        if ($request_method = GET) {
            return 418;
        }
        proxy_pass http://write_pool;
    }

    location @posts_read {
        proxy_pass http://read_pool;
    }

    location ~ ^/api/posts/[^/]+$ {
        proxy_pass http://read_pool;
    }

    location / {
        return 404;
    }
}
