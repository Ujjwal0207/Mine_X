# Phase 2-3: PostgreSQL + Redis + Nginx load balancer
# Write/Read API services run on the host (see scripts/dev.sh)

services:
  postgres:
    image: postgres:16-alpine
    container_name: minix-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: minix
      POSTGRES_PASSWORD: minix_dev
      POSTGRES_DB: minix
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U minix -d minix"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: minix-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    container_name: minix-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - redis
      - postgres

volumes:
  postgres_data:
  redis_data:
